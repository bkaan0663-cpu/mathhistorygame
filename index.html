<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Matematik Tarihi: Anlatım Aracı</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&family=Playfair+Display:ital,wght@0,700;1,700&display=swap" rel="stylesheet">
    <style>
        :root {
            --accent: #3b82f6;
            --accent-glow: rgba(59, 130, 246, 0.5);
            --bg-dark: #020617;
            --card-bg: rgba(30, 41, 59, 0.85);
        }

        body {
            font-family: 'Plus Jakarta Sans', sans-serif;
            background: var(--bg-dark);
            background-image: radial-gradient(circle at 50% -20%, #1e293b 0%, var(--bg-dark) 80%);
            color: #f8fafc;
            overflow: hidden;
            margin: 0;
            height: 100vh;
            width: 100vw;
            display: flex;
            align-items: center;
            justify-content: center;
            touch-action: pan-y;
        }

        @media (orientation: portrait) and (max-width: 1023px) {
            #landscape-warning { display: flex !important; }
            #app-container, #start-screen { display: none !important; }
        }

        #start-screen {
            background: var(--bg-dark);
            background-image: radial-gradient(circle at 50% -20%, #1e293b 0%, var(--bg-dark) 80%);
        }

        .lang-btn {
            transition: all 0.3s ease;
        }
        .lang-btn.active {
            color: #3b82f6;
            text-shadow: 0 0 10px rgba(59, 130, 246, 0.6);
            opacity: 1;
        }

        .card-wrapper {
            perspective: 2000px;
            width: 96vw;
            max-width: 1200px;
            height: 90vh;
            position: relative;
        }

        .math-card {
            width: 100%;
            height: 100%;
            background: var(--card-bg);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border-radius: 24px;
            display: flex;
            flex-direction: row;
            box-shadow: 0 40px 100px -20px rgba(0, 0, 0, 0.9), inset 0 0 0 1px rgba(255, 255, 255, 0.1);
            overflow: hidden;
            transition: transform 0.8s cubic-bezier(0.2, 0.8, 0.2, 1), opacity 0.6s ease;
        }

        @media (min-width: 1024px) {
            .math-card { border-radius: 32px; }
            .card-wrapper { height: 85vh; width: 94vw; }
        }

        .slide-out {
            transform: translateX(-120%) rotateY(-20deg) scale(0.9);
            opacity: 0;
        }

        .slide-in {
            animation: slideIn 0.8s cubic-bezier(0.2, 0.8, 0.2, 1) forwards;
        }

        @keyframes slideIn {
            from { transform: translateX(120%) rotateY(20deg) scale(0.9); opacity: 0; }
            to { transform: translateX(0) rotateY(0deg) scale(1); opacity: 1; }
        }

        .photo-pane {
            flex: 0.8;
            background: #000;
            position: relative;
            overflow: hidden;
        }

        .photo-pane::after {
            content: '';
            position: absolute;
            inset: 0;
            background: linear-gradient(to right, transparent 60%, rgba(2, 6, 23, 0.5));
        }

        .photo-pane img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .info-pane {
            flex: 1.2;
            padding: 2vh 3vw;
            display: flex;
            flex-direction: column;
            background: rgba(15, 23, 42, 0.4);
            position: relative;
            overflow-y: auto;
        }

        @media (min-width: 1024px) {
            .info-pane { padding: 3.5rem; }
        }

        .info-content {
            height: 100%;
            width: 100%;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
        }

        .math-title {
            font-family: 'Playfair Display', serif;
            font-size: clamp(1.5rem, 7vh, 3.2rem);
            line-height: 1.1;
            margin-bottom: 0;
            letter-spacing: -0.02em;
        }

        .blurred-text {
            filter: blur(16px);
            transition: filter 0.6s cubic-bezier(0.4, 0, 0.2, 1);
            user-select: none;
        }

        .unblur {
            filter: blur(0);
        }

        .tag-badge {
            display: inline-block;
            padding: 4px 12px;
            background: rgba(59, 130, 246, 0.15);
            border: 1px solid rgba(59, 130, 246, 0.3);
            color: #60a5fa;
            border-radius: 100px;
            font-size: clamp(0.6rem, 2.5vh, 0.75rem);
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 0.1em;
            margin-bottom: 1rem;
        }

        .fact-item {
            display: flex;
            align-items: flex-start;
            gap: 14px;
            margin-bottom: 1.5vh; 
            font-size: clamp(1.05rem, 2.6vh, 1.25rem); /* Büyütüldü ve optimize edildi */
            line-height: 1.55; /* Okunabilirlik için satır aralığı açıldı */
            color: #ffffff; /* Daha net beyaz */
            font-weight: 500; /* İncelikten kurtulup daha kalın, daha net hale getirildi */
        }

        .fact-dot {
            width: 8px;
            height: 8px;
            background: var(--accent);
            border-radius: 50%;
            margin-top: 1vh;
            box-shadow: 0 0 10px var(--accent-glow);
            flex-shrink: 0;
        }

        .btn-reveal {
            background: var(--accent);
            box-shadow: 0 10px 20px -5px var(--accent-glow);
            transition: all 0.3s ease;
            cursor: pointer;
            align-self: center;
        }

        .btn-reveal:hover {
            transform: translateY(-2px);
            background: #2563eb;
        }

        #landscape-warning {
            display: none;
            position: fixed;
            inset: 0;
            background: var(--bg-dark);
            z-index: 1000;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            text-align: center;
            padding: 2rem;
        }

        .scroll-indicator {
            margin-top: auto; 
            padding-bottom: 1vh;
            display: flex;
            align-items: center;
            gap: 12px;
            color: #94a3b8;
            font-size: clamp(0.65rem, 3vh, 0.8rem);
            font-weight: 600;
        }

        .scroll-line {
            width: 30px;
            height: 2px;
            background: #334155;
            position: relative;
            overflow: hidden;
        }

        .scroll-line::after {
            content: '';
            position: absolute;
            left: -100%;
            width: 100%;
            height: 100%;
            background: var(--accent);
            animation: scrollLine 2s infinite;
        }

        @keyframes scrollLine {
            to { left: 100%; }
        }

        .frac {
            display: inline-block;
            vertical-align: middle;
            text-align: center;
            font-size: 0.85em;
            margin: 0 2px;
        }
        .frac > span { display: block; padding: 0.1em; }
        .frac span.bottom { border-top: 1px solid currentColor; }

        .progress-text {
            position: absolute;
            top: 1vh;
            right: 2vw;
            font-size: clamp(0.6rem, 2.5vh, 0.75rem);
            color: #94a3b8;
            font-weight: 700;
            letter-spacing: 0.05em;
            background: rgba(0,0,0,0.3);
            padding: 4px 12px;
            border-radius: 20px;
            z-index: 10;
        }

        @media (min-width: 1024px) {
            .progress-text { top: 2rem; right: 3.5rem; background: transparent; padding: 0;}
            .scroll-indicator { margin-top: 2.5rem; }
        }

        .info-pane::-webkit-scrollbar { width: 5px; }
        .info-pane::-webkit-scrollbar-track { background: transparent; }
        .info-pane::-webkit-scrollbar-thumb { background: #3b82f6; border-radius: 10px; }
    </style>
</head>
<body>

    <!-- Başlangıç Ekranı (Start Screen) -->
    <div id="start-screen" class="fixed inset-0 z-50 flex flex-col items-center justify-center w-full h-full">
        
        <!-- Dil Seçimi -->
        <div class="absolute top-8 right-12 flex gap-4">
            <button onclick="setLanguage('tr')" id="btn-tr" class="lang-btn active font-bold text-xl opacity-50 hover:opacity-100 uppercase tracking-widest">TR</button>
            <span class="text-slate-600 text-xl">|</span>
            <button onclick="setLanguage('en')" id="btn-en" class="lang-btn font-bold text-xl opacity-50 hover:opacity-100 uppercase tracking-widest">EN</button>
        </div>

        <!-- Başlıklar -->
        <div class="text-center mb-12">
            <h1 id="ui-title" class="text-5xl md:text-7xl font-extrabold font-['Playfair_Display'] mb-4 text-white drop-shadow-lg tracking-tight">Matematik Tarihi</h1>
            <h2 id="ui-subtitle" class="text-xl md:text-2xl text-blue-400 font-light tracking-[0.2em] uppercase">Anlatım Aracı</h2>
        </div>

        <!-- Başla Butonu -->
        <button onclick="startGame()" id="ui-start" class="px-12 py-4 bg-blue-600 hover:bg-blue-500 text-white rounded-full font-bold text-lg tracking-[0.15em] shadow-[0_0_30px_rgba(59,130,246,0.4)] transition-all transform hover:scale-105 mb-16">
            BAŞLA
        </button>

        <!-- Hazırlayanlar Bölümü -->
        <div class="absolute bottom-8 w-full flex flex-col items-center">
            <p id="ui-prep" class="text-xs text-slate-400 uppercase tracking-[0.2em] mb-2 font-semibold">Hazırlayanlar</p>
            <p class="text-sm md:text-base font-bold text-slate-200 tracking-wide text-center">EREN CENGİZ &nbsp;•&nbsp; MEHMET DENİZ &nbsp;•&nbsp; BUĞRA KAAN MEYVECİ</p>
        </div>
    </div>

    <!-- Yan Çevir Uyarısı -->
    <div id="landscape-warning">
        <div class="text-8xl mb-8">🔄</div>
        <h2 id="warn-title" class="text-3xl font-extrabold text-white mb-4">Lütfen Cihazı Çevirin</h2>
        <p id="warn-desc" class="text-slate-400 max-w-xs leading-relaxed">Matematik Tarihi karşılıklı anlatım aracı için yatay mod gereklidir.</p>
    </div>

    <!-- Ana Uygulama Konteyneri -->
    <div id="app-container" class="card-wrapper" style="display: none;"></div>

    <!-- Alt Kısım Fligran (Gizli başlar, oyun başlayınca görünür) -->
    <div id="watermark" style="display: none;" class="fixed bottom-4 left-6 z-0 text-slate-700 font-bold text-xs tracking-widest uppercase opacity-30 select-none pointer-events-none">
        History of Mathematics / 2026
    </div>

            {
                img: "https://upload.wikimedia.org/wikipedia/commons/6/61/%CE%94%CE%B9%CF%8C%CF%86%CE%B1%CE%BD%CF%84%CE%BF%CF%82_-_Diophantos_-_%D0%94%D0%98%D0%9E%D0%A4%D0%90%D0%9D%D0%A2.jpg",
                tr: { name: "Diophantus", era: "M.S. 200 - 284", tag: "Cebirin Babası", facts: ["Sayılar teorisi üzerine kurulu 13 ciltlik başyapıt 'Arithmetica' adlı eserin yazarıdır.", "Denklemleri sembolik bir dil (kısaltmalar ve semboller) kullanarak çözen ilk öncüdür.", "Belirsiz denklemlerin (birden fazla değişkenli) tam sayı çözümleri üzerine uzmanlaştı.", "Fermat'nın meşhur 'Büyük Teoremi'ni yazmasına doğrudan ilham veren temel kaynaktır.", "Negatif sayı kavramını bilmese de çıkarma işlemlerini denklem çözümlerinde kurallaştırdı."] },
                en: { name: "Diophantus", era: "200 - 284 A.D.", tag: "Father of Algebra", facts: ["Author of the seminal 13-volume work 'Arithmetica', built fundamentally on number theory.", "The first true pioneer to solve equations using a form of symbolic language.", "Specialized extensively in finding integer solutions for indeterminate equations.", "Was the fundamental source of inspiration that directly led to Fermat's famous 'Last Theorem'.", "Established rules for subtracting negative values in equations, though he lacked negative numbers."] }
            },
            {
                img: "https://upload.wikimedia.org/wikipedia/commons/thumb/1/11/1983_CPA_5426_%281%29.png/500px-1983_CPA_5426_%281%29.png",
                tr: { name: "Harezmi", era: "780 - 850", tag: "Cebir ve Algoritma", facts: ["Cebiri bağımsız ve sistematik bir matematik dalı olarak kuran 'El-Cebr' kitabını yazmıştır.", "Bilinmeyen (x) için sistematik dengelemeler ve algoritmalar sundu.", "Hint rakamlarını, sıfırı ve onluk sistemi İslam dünyasına ve Avrupa'ya tanıttı.", "İkinci dereceden denklemlerin 6 farklı standart formunu ve geometrik çözümlerini buldu.", "Adı, modern bilgisayar biliminin temeli olan 'Algoritma' terimine dönüştü."] },
                en: { name: "Al-Khwarizmi", era: "780 - 850", tag: "Algebra and Algorithm", facts: ["Wrote 'Al-Jabr', establishing algebra as a fully independent branch of mathematics.", "Presented systematic solution methods and algorithms for finding the unknown (x).", "Ensured the widespread adoption of zero and the decimal system across the globe.", "Found geometric solutions and established the 6 standard forms for solving quadratic equations.", "His name was Latinized to 'Algoritmi', which evolved into the term 'Algorithm'."] }
            },
            {
                img: "https://upload.wikimedia.org/wikipedia/commons/thumb/f/f7/Portrait_of_Sir_Isaac_Newton%2C_1689_%28brightened%29.jpg/500px-Portrait_of_Sir_Isaac_Newton%2C_1689_%28brightened%29.jpg",
                tr: { name: "Isaac Newton", era: "1643 - 1727", tag: "Evrensel Bilim", facts: ["Türev ve integral işlemlerini 'Kalkülüs' (Fluxions) altında birleştirmiştir.", "Evrensel çekim yasasını ve hareket kanunlarını matematiksel bir dille ispatladı.", "Modern fiziğin yönünü tamamen değiştiren başyapıtı 'Principia Mathematica'yı yazmıştır.", "Binom teoremini tamsayı olmayan kuvvetler için genişleterek sonsuz serilere uyguladı.", "Işığın spektrumunu prizmayla ayırarak optik yasalarını geometrik olarak kanıtladı."] },
                en: { name: "Isaac Newton", era: "1643 - 1727", tag: "Universal Science", facts: ["Unified derivative and integral operations into the cohesive framework of 'Calculus'.", "Proved the law of universal gravitation utilizing a strict mathematical language.", "Wrote 'Principia', a masterpiece that permanently changed the direction of modern science.", "Expanded the binomial theorem to fractional powers, applying it brilliantly to infinite series.", "Geometrically proved the laws of optics by separating the spectrum of light using a prism."] }
            },
            {
                img: "https://upload.wikimedia.org/wikipedia/commons/thumb/8/8d/Christoph_Bernhard_Francke_-_Bildnis_des_Philosophen_Leibniz_%28ca._1695%29.jpg/500px-Christoph_Bernhard_Francke_-_Bildnis_des_Philosophen_Leibniz_%28ca._1695%29.jpg",
                tr: { name: "Leibniz", era: "1646 - 1716", tag: "Sembolik Kalkülüs", facts: ["Bugün kullandığımız türev (dx) ve integral (∫) sembollerini içeren modern notasyonu kurdu.", "Modern bilgisayar mantığının ve mimarisinin temeli olan ikili (binary) sayı sistemini tasarladı.", "Newton'dan bağımsız olarak Kalkülüs'ü eş zamanlı keşfeden evrensel dâhidir.", "Matematiği evrensel ve hatasız bir sembolik mantık dili yapmayı hedefledi.", "Toplama, çıkarma, çarpma ve bölme yapabilen ilk gelişmiş mekanik hesap makinesini icat etti."] },
                en: { name: "Gottfried Leibniz", era: "1646 - 1716", tag: "Symbolic Calculus", facts: ["Established the modern mathematical notation, including the enduring dx and ∫ symbols.", "Conducted early work on the binary system, the very foundation of modern computer logic.", "A genius who independently discovered Calculus concurrently with Isaac Newton.", "Aimed to transform mathematics into a universal, error-free language of symbolic logic.", "Invented the 'Step Reckoner', the first advanced mechanical calculator capable of 4 operations."] }
            }
        ];

        // UI Metin Çevirileri
        const uiText = {
            tr: {
                title: "Matematik Tarihi",
                subtitle: "Anlatım Aracı",
                prep: "Hazırlayanlar",
                start: "BAŞLA",
                warnTitle: "Lütfen Cihazı Çevirin",
                warnDesc: "Matematik Tarihi karşılıklı anlatım aracı için yatay mod gereklidir.",
                reveal: "İSMİ AÇ",
                next: "Sonraki Matematikçi"
            },
            en: {
                title: "History of Math",
                subtitle: "Presentation Tool",
                prep: "Prepared By",
                start: "START",
                warnTitle: "Rotate Your Device",
                warnDesc: "Landscape mode is required for the History of Mathematics presentation tool.",
                reveal: "REVEAL NAME",
                next: "Next Mathematician"
            }
        };

        let currentLang = 'tr';
        let pool = [];
        let isAnimating = false;
        const container = document.getElementById('app-container');

        // Dil Seçimi Fonksiyonu
        function setLanguage(lang) {
            currentLang = lang;
            
            // Buton Stilleri
            document.getElementById('btn-tr').classList.toggle('active', lang === 'tr');
            document.getElementById('btn-en').classList.toggle('active', lang === 'en');
            
            // Başlangıç Ekranı ve Uyarı Çevirileri
            document.getElementById('ui-title').innerText = uiText[lang].title;
            document.getElementById('ui-subtitle').innerText = uiText[lang].subtitle;
            document.getElementById('ui-prep').innerText = uiText[lang].prep;
            document.getElementById('ui-start').innerText = uiText[lang].start;
            document.getElementById('warn-title').innerText = uiText[lang].warnTitle;
            document.getElementById('warn-desc').innerText = uiText[lang].warnDesc;
        }

        // Oyunu Başlat
        function startGame() {
            document.getElementById('start-screen').style.display = 'none';
            document.getElementById('app-container').style.display = 'flex';
            document.getElementById('watermark').style.display = 'block';
            resetPool();
            renderNext();
        }

        function shuffle(array) {
            for (let i = array.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [array[i], array[j]] = [array[j], array[i]];
            }
        }

        function resetPool() {
            pool = Array.from({length: historyOfMath.length}, (_, i) => i);
            shuffle(pool);
        }

        function createCard(dataIndex) {
            const mathData = historyOfMath[dataIndex];
            // Seçili dile göre veriyi çek
            const m = mathData[currentLang]; 
            
            const card = document.createElement('div');
            card.className = 'math-card slide-in';
            
            const factsHtml = m.facts.map(fact => `
                <div class="fact-item">
                    <span class="fact-dot"></span>
                    <span>${fact}</span>
                </div>
            `).join('');

            const currentOrder = historyOfMath.length - pool.length;

            card.innerHTML = `
                <div class="photo-pane">
                    <div class="absolute top-4 left-4 lg:top-8 lg:left-8 z-10">
                        <span class="tag-badge">${m.tag}</span>
                    </div>
                    <img src="${mathData.img}" alt="Matematikçi" loading="lazy" onerror="this.src='https://via.placeholder.com/800x1200?text=Portre+Bekleniyor'">
                </div>
                <div class="info-pane">
                    <div class="progress-text">${currentOrder} / ${historyOfMath.length}</div>
                    
                    <div class="info-content">
                        <div class="mb-2 lg:mb-6 mt-auto">
                            <h1 id="math-name" class="math-title blurred-text text-white">${m.name}</h1>
                            <div class="flex items-center justify-between mt-1 lg:mt-2">
                                <p class="text-slate-400 font-medium text-xs lg:text-lg italic">${m.era}</p>
                                <button onclick="revealName(this)" class="btn-reveal px-4 py-1.5 lg:px-8 lg:py-3 rounded-full text-[0.65rem] lg:text-sm font-bold tracking-widest uppercase text-white shadow-xl">${uiText[currentLang].reveal}</button>
                            </div>
                        </div>
                        
                        <div class="flex-grow flex flex-col justify-center mb-2 lg:mb-6">
                            ${factsHtml}
                        </div>
                        
                        <div class="scroll-indicator">
                            <div class="scroll-line"></div>
                            <span>${uiText[currentLang].next}</span>
                        </div>
                    </div>
                </div>
            `;
            return card;
        }

        function revealName(btn) {
            const nameEl = btn.closest('.info-pane').querySelector('#math-name');
            nameEl.classList.add('unblur');
            btn.style.opacity = '0';
            btn.style.pointerEvents = 'none';
        }

        function nextCard() {
            if (isAnimating) return;
            isAnimating = true;

            const old = container.querySelector('.math-card');
            if(old) {
                old.classList.remove('slide-in');
                old.classList.add('slide-out');
                setTimeout(() => {
                    old.remove();
                    renderNext();
                    isAnimating = false;
                }, 600);
            } else {
                renderNext();
                isAnimating = false;
            }
        }

        function renderNext() {
            if (pool.length === 0) {
                resetPool();
            }
            const nextIndex = pool.shift();
            container.appendChild(createCard(nextIndex));
        }

        // Swipe & Scroll Logic
        let startX = 0;
        let startY = 0;
        
        window.addEventListener('touchstart', e => {
            startX = e.touches[0].clientX;
            startY = e.touches[0].clientY;
        }, {passive: true});
        
        window.addEventListener('touchend', e => {
            const diffX = startX - e.changedTouches[0].clientX;
            const diffY = Math.abs(startY - e.changedTouches[0].clientY);
            
            if (diffX > 60 && diffY < 50 && document.getElementById('app-container').style.display === 'flex') {
                nextCard();
            }
        }, {passive: true});

        let scrollTimeout;
        window.addEventListener('wheel', e => {
            if (Math.abs(e.deltaX) > 50 && Math.abs(e.deltaY) < 20 && document.getElementById('app-container').style.display === 'flex') {
                if (!scrollTimeout) {
                    nextCard();
                    scrollTimeout = setTimeout(() => scrollTimeout = null, 1000);
                }
            }
        }, {passive: true});

        window.addEventListener('keydown', e => {
            if (["ArrowRight", " ", "Enter"].includes(e.key) && document.getElementById('app-container').style.display === 'flex') {
                nextCard();
            }
        });
    </script>
</body>
</html>
